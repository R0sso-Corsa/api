<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Stock Dashboard</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffdf8;
      --ink: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
      --accent-soft: #ccfbf1;
      --line: #d6d3d1;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #fff7ed 0%, var(--bg) 45%, #e7e5e4 100%);
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(15,118,110,0.10), rgba(255,255,255,0.9));
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    .hero h1 { margin: 0 0 8px; font-size: clamp(2rem, 4vw, 3.5rem); }
    .hero p { margin: 0; color: var(--muted); }

    .toolbar {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr auto auto;
      gap: 12px;
      margin-top: 18px;
    }

    input, select, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      font: inherit;
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: #134e4a;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      margin-top: 20px;
    }

    .card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.05);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 1.1rem;
    }

    .quote-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      padding: 12px;
      border-radius: 16px;
      background: #fafaf9;
      border: 1px solid var(--line);
    }

    .metric label {
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 1.2rem;
    }

    .chart {
      width: 100%;
      min-height: 320px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #f8fafc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 0.95rem;
    }

    th { color: var(--muted); font-weight: 600; }
    .status { margin-top: 12px; color: var(--muted); min-height: 1.2rem; }
    .error { color: var(--danger); }

    @media (max-width: 860px) {
      .toolbar, .grid, .quote-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Local Stock Dashboard</h1>
      <p>Pull price data from your self-hosted API, inspect quote fields, and view price history in one place.</p>
      <div class="toolbar">
        <input id="symbolInput" value="AAPL" placeholder="Ticker symbol" />
        <select id="daysSelect">
          <option value="5">5 days</option>
          <option value="30" selected>30 days</option>
          <option value="90">90 days</option>
          <option value="180">180 days</option>
          <option value="365">365 days</option>
        </select>
        <button id="loadBtn">Load</button>
        <button id="syncBtn" class="secondary">Live Sync</button>
      </div>
      <div id="status" class="status">Ready.</div>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Chart</h2>
        <img id="chart" class="chart" alt="Price chart" />
      </article>

      <article class="card">
        <h2>Quote</h2>
        <div id="quoteGrid" class="quote-grid"></div>
      </article>
    </section>

    <section class="card" style="margin-top: 18px;">
      <h2>History</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Open</th>
            <th>High</th>
            <th>Low</th>
            <th>Close</th>
            <th>Volume</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </section>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const symbolInput = document.getElementById("symbolInput");
    const daysSelect = document.getElementById("daysSelect");
    const quoteGrid = document.getElementById("quoteGrid");
    const historyBody = document.getElementById("historyBody");
    const chartImg = document.getElementById("chart");

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? "status error" : "status";
    }

    function fmtNumber(value) {
      if (value === null || value === undefined) return "-";
      return new Intl.NumberFormat("en-US", { maximumFractionDigits: 2 }).format(value);
    }

    function fmtMoney(value) {
      if (value === null || value === undefined) return "-";
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(value);
    }

    function renderQuote(quote) {
      const fields = [
        ["Symbol", quote.symbol],
        ["Name", quote.name],
        ["Price", fmtMoney(quote.price)],
        ["Change", `${fmtNumber(quote.change_amount)} (${fmtNumber(quote.change_percent)}%)`],
        ["Open", fmtMoney(quote.open_price)],
        ["High", fmtMoney(quote.high_price)],
        ["Low", fmtMoney(quote.low_price)],
        ["Prev Close", fmtMoney(quote.previous_close)],
        ["Volume", fmtNumber(quote.volume)],
      ];
      quoteGrid.innerHTML = fields.map(([label, value]) => `
        <div class="metric">
          <label>${label}</label>
          <strong>${value}</strong>
        </div>
      `).join("");
    }

    function renderHistory(rows) {
      historyBody.innerHTML = rows.map((row) => `
        <tr>
          <td>${row.trade_date}</td>
          <td>${fmtMoney(row.open_price)}</td>
          <td>${fmtMoney(row.high_price)}</td>
          <td>${fmtMoney(row.low_price)}</td>
          <td>${fmtMoney(row.close_price)}</td>
          <td>${fmtNumber(row.volume)}</td>
        </tr>
      `).join("");
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const rawText = await response.text();
      let data = null;

      try {
        data = rawText ? JSON.parse(rawText) : null;
      } catch {
        if (!response.ok) {
          throw new Error(rawText || `Request failed: ${response.status}`);
        }
        throw new Error("Server returned non-JSON response.");
      }

      if (!response.ok) {
        throw new Error(data?.error || rawText || `Request failed: ${response.status}`);
      }

      return data;
    }

    async function loadData() {
      const symbol = symbolInput.value.trim().toUpperCase();
      const days = daysSelect.value;
      if (!symbol) {
        setStatus("Enter ticker symbol.", true);
        return;
      }

      setStatus(`Loading ${symbol}...`);
      try {
        const [quote, history] = await Promise.all([
          fetchJson(`/v1/quotes/${symbol}`),
          fetchJson(`/v1/history/${symbol}?limit=${days}`),
        ]);
        renderQuote(quote);
        renderHistory(history.items);
        chartImg.src = `/v1/chart/${symbol}.svg?days=${days}&t=${Date.now()}`;
        setStatus(`Loaded ${symbol}.`);
      } catch (error) {
        quoteGrid.innerHTML = "";
        historyBody.innerHTML = "";
        chartImg.removeAttribute("src");
        setStatus(error.message, true);
      }
    }

    async function syncLive() {
      const symbol = symbolInput.value.trim().toUpperCase();
      if (!symbol) {
        setStatus("Enter ticker symbol.", true);
        return;
      }
      const token = window.prompt("Enter X-API-Key for live sync:", "change-me-local-token");
      if (!token) {
        setStatus("Live sync cancelled.");
        return;
      }

        setStatus(`Syncing ${symbol} from remote provider...`);
      try {
        const result = await fetchJson(`/v1/admin/sync/alpha-vantage/${symbol}`, {
          method: "POST",
          headers: { "X-API-Key": token },
        });
        setStatus(`Synced ${result.symbol} at ${result.price} on ${result.latest_trade_date}.`);
        await loadData();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    document.getElementById("loadBtn").addEventListener("click", loadData);
    document.getElementById("syncBtn").addEventListener("click", syncLive);
    symbolInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") loadData();
    });

    loadData();
  </script>
</body>
</html>
